<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>PILOT TOOLKIT // TELEMETRY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.3/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<style>
  :root{
    --bg:#070807; --panel:#0b0f0b; --panel-2:#0e140e;
    --line:rgba(61,220,110,.16); --line-strong:rgba(61,220,110,.32);
    --accent:#3ddc6e; --accent-dim:#2a9c4f; --accent-glow:rgba(61,220,110,.25);
    --text:#cfe9d6; --muted:#6f8f78; --danger:#ff5f56; --warn:#ffcf5f;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:'IBM Plex Mono',monospace; font-size:13px; line-height:1.5;
    min-height:100vh; position:relative; overflow-x:hidden;
  }
  /* faint green grid overlay */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:40px 40px; opacity:.5;
    mask-image:radial-gradient(circle at 50% 30%,#000 30%,transparent 90%);
  }
  .wrap{position:relative; z-index:1; max-width:1180px; margin:0 auto; padding:22px 18px 80px}
  h1,h2,h3{font-family:'Chakra Petch',sans-serif; margin:0; letter-spacing:.04em}
  .mono{font-family:'IBM Plex Mono',monospace}
  a{color:var(--accent)}

  /* ---------- LOGIN ---------- */
  .login-screen{min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; z-index:1; padding:20px}
  .login-card{
    width:100%; max-width:360px; background:var(--panel);
    border:1px solid var(--line-strong); border-radius:10px; padding:28px 26px;
    box-shadow:0 0 0 1px rgba(0,0,0,.4),0 24px 60px -20px var(--accent-glow);
  }
  .brandmark{display:flex; align-items:center; gap:9px; margin-bottom:4px}
  .brand-dot{width:9px; height:9px; border-radius:2px; background:var(--accent); box-shadow:0 0 10px var(--accent)}
  .login-card h1{font-size:17px; font-weight:600; color:#eafff0}
  .login-sub{color:var(--muted); font-size:11px; letter-spacing:.14em; text-transform:uppercase; margin:14px 0 18px}
  label{display:block; color:var(--muted); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; margin:0 0 6px}
  input{
    width:100%; background:#060906; border:1px solid var(--line-strong); color:var(--text);
    font-family:'IBM Plex Mono',monospace; font-size:13px; padding:10px 12px; border-radius:7px; margin-bottom:14px; outline:none;
  }
  input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow)}
  button{font-family:'Chakra Petch',sans-serif; cursor:pointer}
  .btn-primary{
    width:100%; background:var(--accent); color:#04130a; border:none; font-weight:700;
    letter-spacing:.08em; padding:11px; border-radius:7px; font-size:13px; text-transform:uppercase;
    transition:filter .15s;
  }
  .btn-primary:hover{filter:brightness(1.1)}
  .btn-primary:disabled{opacity:.5; cursor:not-allowed}
  .auth-msg{min-height:16px; font-size:11px; margin-top:10px; letter-spacing:.04em}
  .auth-msg.err{color:var(--danger)}
  .auth-msg.ok{color:var(--accent)}

  /* ---------- HEADER ---------- */
  .topbar{display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--line-strong)}
  .topbar h1{font-size:18px; font-weight:700; color:#eafff0; display:flex; align-items:center; gap:10px}
  .live{display:inline-flex; align-items:center; gap:6px; font-size:10px; letter-spacing:.16em; color:var(--accent); text-transform:uppercase}
  .live .pulse{width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 var(--accent-glow)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}
  .topbar-right{display:flex; align-items:center; gap:12px; font-size:11px; color:var(--muted)}
  .btn-ghost{background:transparent; border:1px solid var(--line-strong); color:var(--muted); padding:7px 12px; border-radius:6px; font-size:11px; letter-spacing:.06em; text-transform:uppercase}
  .btn-ghost:hover{border-color:var(--accent); color:var(--accent)}

  /* ---------- CARDS ---------- */
  .cards{display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-bottom:18px}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:9px; padding:14px}
  .card .k{font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted)}
  .card .v{font-family:'Chakra Petch',sans-serif; font-size:30px; font-weight:700; color:#eafff0; line-height:1.1; margin-top:6px}
  .card.accent .v{color:var(--accent)}

  .panel{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:16px 18px; margin-bottom:18px}
  .panel-head{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; flex-wrap:wrap}
  .panel-head h2{font-size:13px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#dff7e6}
  .seg{display:inline-flex; border:1px solid var(--line-strong); border-radius:7px; overflow:hidden}
  .seg button{background:transparent; color:var(--muted); border:none; padding:6px 13px; font-size:11px; letter-spacing:.08em; text-transform:uppercase}
  .seg button.on{background:var(--accent); color:#04130a; font-weight:700}

  .split{display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:18px}

  /* breakdown bars */
  .bar-row{margin-bottom:11px}
  .bar-row:last-child{margin-bottom:0}
  .bar-top{display:flex; justify-content:space-between; align-items:baseline; gap:10px; margin-bottom:5px}
  .bar-label{color:var(--text); font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .bar-sub{color:var(--muted); font-size:10.5px}
  .bar-count{color:var(--accent); font-family:'Chakra Petch',sans-serif; font-weight:600}
  .bar-track{height:7px; background:#060a06; border-radius:4px; overflow:hidden}
  .bar-fill{height:100%; background:linear-gradient(90deg,var(--accent-dim),var(--accent)); border-radius:4px}

  /* ---------- LOG TABLE ---------- */
  .log-filters{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px}
  .log-filters input,.log-filters select{margin:0; width:auto; flex:1; min-width:140px; padding:8px 11px}
  table{width:100%; border-collapse:collapse; font-size:12px}
  thead th{text-align:left; color:var(--muted); font-size:10px; letter-spacing:.12em; text-transform:uppercase; font-weight:500; padding:8px 10px; border-bottom:1px solid var(--line-strong); position:sticky; top:0; background:var(--panel)}
  tbody td{padding:9px 10px; border-bottom:1px solid var(--line); vertical-align:top}
  tbody tr:hover{background:var(--panel-2)}
  .t-time{color:#eafff0; white-space:nowrap}
  .t-ago{color:var(--muted); font-size:10.5px}
  .t-page{color:var(--accent)}
  .t-loc{color:var(--text)}
  .t-muted{color:var(--muted)}
  .flag{margin-right:5px}
  .log-scroll{max-height:520px; overflow:auto; border:1px solid var(--line); border-radius:8px}
  .empty{color:var(--muted); text-align:center; padding:40px 10px; font-size:12px; letter-spacing:.05em}
  .count-tag{color:var(--muted); font-size:11px}

  @media(max-width:880px){
    .cards{grid-template-columns:repeat(2,1fr)}
    .split{grid-template-columns:1fr}
  }
  @media (prefers-reduced-motion:reduce){ .live .pulse{animation:none} }
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="brandmark"><span class="brand-dot"></span><h1>PILOT TOOLKIT</h1></div>
    <div class="login-sub">Telemetry &middot; restricted access</div>
    <label for="email">Operator email</label>
    <input id="email" type="email" autocomplete="username" placeholder="you@example.com" />
    <label for="pw">Password</label>
    <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••" />
    <button class="btn-primary" id="loginBtn">Sign in</button>
    <div class="auth-msg" id="authMsg"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div class="wrap" id="app" style="display:none">
  <div class="topbar">
    <h1><span class="brand-dot" style="width:11px;height:11px"></span>TELEMETRY
      <span class="live"><span class="pulse"></span>Live</span>
    </h1>
    <div class="topbar-right">
      <span id="whoami"></span>
      <button class="btn-ghost" id="logoutBtn">Sign out</button>
    </div>
  </div>

  <div class="cards" id="cards"></div>

  <div class="panel">
    <div class="panel-head">
      <h2>Visits over time</h2>
      <div class="seg" id="granSeg">
        <button data-g="day" class="on">Day</button>
        <button data-g="week">Week</button>
        <button data-g="month">Month</button>
        <button data-g="year">Year</button>
      </div>
    </div>
    <div style="height:240px"><canvas id="chart"></canvas></div>
  </div>

  <div class="split">
    <div class="panel" style="margin-bottom:0">
      <div class="panel-head"><h2>By page</h2><span class="count-tag" id="pageCount"></span></div>
      <div id="pageBreakdown"></div>
    </div>
    <div class="panel" style="margin-bottom:0">
      <div class="panel-head"><h2>By location</h2><span class="count-tag" id="locCount"></span></div>
      <div id="locBreakdown"></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head">
      <h2>Access log</h2>
      <span class="count-tag" id="logCount"></span>
    </div>
    <div class="log-filters">
      <input id="search" type="text" placeholder="Search location / ISP / IP / device…" />
      <select id="pageFilter"><option value="">All pages</option></select>
    </div>
    <div class="log-scroll">
      <table>
        <thead><tr>
          <th>Time</th><th>Page</th><th>Location</th><th>ISP</th><th>IP</th><th>Device</th>
        </tr></thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
/* ======================================================================
   CONFIG — fill these two in.
   1) firebaseConfig: paste from your existing project (same one your other
      tools use). The config is NOT a secret — it ships in the public pages
      too. Read access is gated by the security rules, not by hiding this.
   2) ALLOWED_EMAIL: your operator email. Must match the email in the
      database security rules. Only this account can read the data.
   ====================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyDkNK3sLWfoRIT5jU2xwMNlQmOPg5AH9WI",
  authDomain: "toolkit-analytics-8117e.firebaseapp.com",
  databaseURL: "https://toolkit-analytics-8117e-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "toolkit-analytics-8117e",
  storageBucket: "toolkit-analytics-8117e.firebasestorage.app",
  messagingSenderId: "489051170516",
  appId: "1:489051170516:web:cd4eb32cd57b2bfba13d41"
};
const ALLOWED_EMAIL = "muhammadhamkah@gmail.com";

/* ---------------------------------------------------------------------- */
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const $ = id => document.getElementById(id);
let EVENTS = [];          // normalized events
let gran = "day";
let chart = null;
let dbRef = null;

/* ---------- AUTH ---------- */
$("loginBtn").addEventListener("click", doLogin);
$("pw").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
$("email").addEventListener("keydown", e => { if (e.key === "Enter") $("pw").focus(); });
$("logoutBtn").addEventListener("click", () => auth.signOut());

function doLogin(){
  const email = $("email").value.trim();
  const pw = $("pw").value;
  const msg = $("authMsg");
  msg.className = "auth-msg"; msg.textContent = "Authenticating…";
  $("loginBtn").disabled = true;
  auth.signInWithEmailAndPassword(email, pw)
    .catch(err => {
      msg.className = "auth-msg err";
      msg.textContent = ({
        "auth/invalid-credential":"Invalid email or password.",
        "auth/wrong-password":"Invalid email or password.",
        "auth/user-not-found":"No operator account for that email.",
        "auth/invalid-email":"That doesn't look like an email.",
        "auth/too-many-requests":"Too many attempts. Wait a moment."
      })[err.code] || err.message;
    })
    .finally(() => { $("loginBtn").disabled = false; });
}

auth.onAuthStateChanged(user => {
  if (user) {
    if (user.email !== ALLOWED_EMAIL) {
      $("authMsg").className = "auth-msg err";
      $("authMsg").textContent = "This account isn't authorized to view telemetry.";
      auth.signOut(); return;
    }
    $("loginScreen").style.display = "none";
    $("app").style.display = "block";
    $("whoami").textContent = user.email;
    subscribe();
  } else {
    if (dbRef) { dbRef.off(); dbRef = null; }
    $("app").style.display = "none";
    $("loginScreen").style.display = "flex";
    $("pw").value = "";
  }
});

/* ---------- DATA ---------- */
function subscribe(){
  dbRef = db.ref("analytics/events").limitToLast(5000);
  dbRef.on("value", snap => {
    const out = [];
    snap.forEach(c => {
      const v = c.val() || {};
      out.push({
        ts: typeof v.ts === "number" ? v.ts : Date.parse(v.ts) || 0,
        page: v.page || v.path || "unknown",
        city: v.city || "", region: v.region || "", country: v.country || "",
        cc: (v.cc || "").toUpperCase(), isp: v.isp || "", ip: v.ip || "",
        ua: v.ua || "", tz: v.tz || ""
      });
    });
    out.sort((a,b) => b.ts - a.ts);
    EVENTS = out;
    renderAll();
  }, err => {
    $("authMsg").className = "auth-msg err";
    $("authMsg").textContent = "Read denied — check security rules / email match.";
    console.error(err);
  });
}

/* ---------- DATE HELPERS (local time) ---------- */
const startOfDay   = t => { const d=new Date(t); d.setHours(0,0,0,0); return d.getTime(); };
const startOfWeek  = t => { const d=new Date(t); const o=(d.getDay()+6)%7; d.setHours(0,0,0,0); d.setDate(d.getDate()-o); return d.getTime(); };
const startOfMonth = t => { const d=new Date(t); d.setHours(0,0,0,0); d.setDate(1); return d.getTime(); };
const startOfYear  = t => { const d=new Date(t); d.setHours(0,0,0,0); d.setMonth(0,1); return d.getTime(); };

function ago(ts){
  const s = Math.floor((Date.now()-ts)/1000);
  if (s < 45) return "just now";
  if (s < 90) return "1 min ago";
  const m = Math.floor(s/60); if (m < 60) return m+" min ago";
  const h = Math.floor(m/60); if (h < 24) return h+" hr ago";
  const d = Math.floor(h/24); if (d < 30) return d+" day"+(d>1?"s":"")+" ago";
  const mo = Math.floor(d/30); if (mo < 12) return mo+" mo ago";
  return Math.floor(mo/12)+" yr ago";
}
function fmtTime(ts){
  return new Date(ts).toLocaleString(undefined,{year:"2-digit",month:"short",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"});
}
function flag(cc){
  if (!cc || cc.length !== 2) return "";
  return cc.replace(/./g, c => String.fromCodePoint(127397 + c.charCodeAt(0)));
}
function locString(e){
  const parts = [e.city, e.region && e.region !== e.city ? e.region : "", e.country].filter(Boolean);
  return parts.join(", ") || "—";
}
function device(ua){
  if (!ua) return "—";
  let os = /Windows/.test(ua) ? "Windows" : /Android/.test(ua) ? "Android"
    : /iPhone|iPad|iOS/.test(ua) ? "iOS" : /Mac OS X|Macintosh/.test(ua) ? "macOS"
    : /Linux/.test(ua) ? "Linux" : "?";
  let br = /Edg\//.test(ua) ? "Edge" : /OPR\/|Opera/.test(ua) ? "Opera"
    : /Chrome\//.test(ua) ? "Chrome" : /Firefox\//.test(ua) ? "Firefox"
    : /Safari\//.test(ua) ? "Safari" : "?";
  return os + " · " + br;
}

/* ---------- RENDER ---------- */
function renderAll(){
  [renderCards, renderChart, renderPages, renderLocations, renderLog].forEach(function(fn){
    try { fn(); } catch (e) { console.error("[telemetry] " + fn.name + " failed:", e); }
  });
}

function renderCards(){
  const now = Date.now();
  const d0 = startOfDay(now), w0 = startOfWeek(now), m0 = startOfMonth(now), y0 = startOfYear(now);
  let today=0, week=0, month=0, year=0;
  const ips = new Set();
  for (const e of EVENTS){
    if (e.ts >= d0) today++;
    if (e.ts >= w0) week++;
    if (e.ts >= m0) month++;
    if (e.ts >= y0) year++;
    if (e.ip) ips.add(e.ip);
  }
  const cards = [
    ["Today", today, true], ["This week", week], ["This month", month],
    ["This year", year], ["All time", EVENTS.length, true], ["Unique IPs", ips.size]
  ];
  $("cards").innerHTML = cards.map(c =>
    `<div class="card${c[2]?' accent':''}"><div class="k">${c[0]}</div><div class="v">${c[1].toLocaleString()}</div></div>`
  ).join("");
}

function bucketRange(){
  if (!EVENTS.length) return [];
  const max = Date.now();
  let stepStart, fmt, prev, cap;
  if (gran === "day"){ stepStart=startOfDay; cap=45; fmt=t=>new Date(t).toLocaleDateString(undefined,{month:"short",day:"numeric"}); prev=t=>t+86400000; }
  else if (gran === "week"){ stepStart=startOfWeek; cap=26; fmt=t=>"wk "+new Date(t).toLocaleDateString(undefined,{month:"short",day:"numeric"}); prev=t=>t+7*86400000; }
  else if (gran === "month"){ stepStart=startOfMonth; cap=24; fmt=t=>new Date(t).toLocaleDateString(undefined,{month:"short",year:"2-digit"}); prev=t=>{const d=new Date(t); d.setMonth(d.getMonth()+1); return d.getTime();}; }
  else { stepStart=startOfYear; cap=20; fmt=t=>String(new Date(t).getFullYear()); prev=t=>{const d=new Date(t); d.setFullYear(d.getFullYear()+1); return d.getTime();}; }

  const counts = {};
  let minB = Infinity;
  for (const e of EVENTS){ const b = stepStart(e.ts); counts[b]=(counts[b]||0)+1; if (b<minB) minB=b; }
  // build continuous buckets from minB→now, then keep last `cap`
  const buckets = [];
  let t = minB;
  let guard = 0;
  while (t <= startOfDay(max)+1 && guard < 5000){ buckets.push(t); t = prev(t); guard++; if (gran!=="day") t = (stepStart(t)); }
  const slice = buckets.slice(-cap);
  return slice.map(b => ({ label: fmt(b), count: counts[b] || 0 }));
}

function renderChart(){
  if (typeof Chart === "undefined"){ console.warn("[telemetry] chart library unavailable — skipping chart, other sections unaffected"); return; }
  const data = bucketRange();
  const labels = data.map(d => d.label);
  const vals = data.map(d => d.count);
  const css = getComputedStyle(document.documentElement);
  const accent = css.getPropertyValue('--accent').trim();
  const grid = 'rgba(61,220,110,0.10)';
  const muted = css.getPropertyValue('--muted').trim();
  if (chart) chart.destroy();
  chart = new Chart($("chart"), {
    type: "bar",
    data: { labels, datasets:[{ data:vals, backgroundColor:accent+"cc", hoverBackgroundColor:accent, borderRadius:3, maxBarThickness:34 }] },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ backgroundColor:"#0b0f0b", borderColor:accent, borderWidth:1, titleColor:"#eafff0", bodyColor:accent, displayColors:false, callbacks:{ label:c=>c.parsed.y+" visits" } } },
      scales:{
        x:{ grid:{display:false}, ticks:{ color:muted, font:{family:"'IBM Plex Mono'", size:10}, maxRotation:0, autoSkip:true } },
        y:{ beginAtZero:true, grid:{color:grid}, ticks:{ color:muted, font:{family:"'IBM Plex Mono'", size:10}, precision:0 } }
      }
    }
  });
}

$("granSeg").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  gran = b.dataset.g;
  [...$("granSeg").children].forEach(x => x.classList.toggle("on", x === b));
  renderChart();
});

function barList(rows, totalLabel){
  if (!rows.length) return '<div class="empty">No data yet.</div>';
  const max = Math.max(...rows.map(r => r.count));
  return rows.map(r => `
    <div class="bar-row">
      <div class="bar-top">
        <span class="bar-label">${r.label}</span>
        <span><span class="bar-count">${r.count}</span> ${r.sub?`<span class="bar-sub">· ${r.sub}</span>`:""}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max(4,(r.count/max)*100)}%"></div></div>
    </div>`).join("");
}

function renderPages(){
  const map = {};
  for (const e of EVENTS){ const k=e.page; (map[k]=map[k]||{count:0,last:0}); map[k].count++; if(e.ts>map[k].last) map[k].last=e.ts; }
  const rows = Object.entries(map).map(([label,o]) => ({ label, count:o.count, sub:"last "+ago(o.last) }))
    .sort((a,b)=>b.count-a.count);
  $("pageCount").textContent = rows.length + " page" + (rows.length!==1?"s":"");
  $("pageBreakdown").innerHTML = barList(rows);
}

function renderLocations(){
  const map = {};
  for (const e of EVENTS){
    const k = (e.city || e.country || "Unknown") + (e.country && e.city ? ", "+e.country : "");
    const key = k.trim() || "Unknown";
    (map[key]=map[key]||{count:0,cc:e.cc}); map[key].count++;
  }
  let rows = Object.entries(map).map(([label,o]) => ({ label:(o.cc?flag(o.cc)+" ":"")+label, count:o.count }))
    .sort((a,b)=>b.count-a.count);
  const shown = rows.slice(0,10);
  $("locCount").textContent = rows.length + " location" + (rows.length!==1?"s":"");
  $("locBreakdown").innerHTML = barList(shown);
}

/* ---------- LOG ---------- */
$("search").addEventListener("input", renderLog);
$("pageFilter").addEventListener("change", renderLog);

function refreshPageFilter(){
  const sel = $("pageFilter");
  const cur = sel.value;
  const pages = [...new Set(EVENTS.map(e => e.page))].sort();
  sel.innerHTML = '<option value="">All pages</option>' + pages.map(p => `<option>${p}</option>`).join("");
  sel.value = pages.includes(cur) ? cur : "";
}

function renderLog(){
  refreshPageFilter();
  const q = $("search").value.trim().toLowerCase();
  const pf = $("pageFilter").value;
  let rows = EVENTS;
  if (pf) rows = rows.filter(e => e.page === pf);
  if (q) rows = rows.filter(e => (locString(e)+" "+e.isp+" "+e.ip+" "+device(e.ua)+" "+e.page).toLowerCase().includes(q));
  $("logCount").textContent = rows.length.toLocaleString() + " event" + (rows.length!==1?"s":"");
  const view = rows.slice(0, 1000);
  if (!view.length){ $("logBody").innerHTML = `<tr><td colspan="6"><div class="empty">No events match.</div></td></tr>`; return; }
  $("logBody").innerHTML = view.map(e => `
    <tr>
      <td class="t-time">${fmtTime(e.ts)}<div class="t-ago">${ago(e.ts)}</div></td>
      <td class="t-page">${e.page}</td>
      <td class="t-loc">${e.cc?`<span class="flag">${flag(e.cc)}</span>`:""}${locString(e)}</td>
      <td class="t-muted">${e.isp || "—"}</td>
      <td class="t-muted">${e.ip || "—"}</td>
      <td class="t-muted">${device(e.ua)}</td>
    </tr>`).join("");
}
</script>
